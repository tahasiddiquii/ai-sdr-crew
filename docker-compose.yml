# One-command full stack. `docker compose up` -> API on :8000, console on :3000.
# Runs offline with a deterministic crew; no keys, no external services.
services:
  api:
    build: ./backend
    environment:
      SDR_PROVIDER: "mock" # set to "openai" + OPENAI_API_KEY for the real CrewAI crew
      SDR_WEB_ORIGIN: "http://localhost:3000"
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - api
